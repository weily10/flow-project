<div class="card">
  <ng-content></ng-content>

  <form [formGroup]="form">
    <div class="grid p-fluid gap-3">
      <div *ngFor="let field of fields" class="gap-2 w-full">
        <label [for]="field.name">{{ field.label }}</label>
        <input
          class="mt-1"
          [id]="field.name"
          [type]="field.type"
          pInputText
          [formControlName]="field.name"
        />
      </div>
    </div>
  </form>
</div>

<div class="mt-3 flex justify-content-end">
  <!-- <p-button
    type="button"
    (click)="onSubmit()"
    [disabled]="isLoading || form.invalid"
    >Submit</p-button
  > -->
  <p-button
      type="button"
      [disabled]="isLoading || form.invalid  "
      (click)="onSubmit()"
       >Submit</p-button
    >
</div>
